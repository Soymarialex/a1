<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los colores / Colors</title>
    <style>
        /* Guía de Estilo Visual */
        :root {
            --color-primario: #FF79AC;
            --color-secundario: #FFB3D1;
            --color-texto: #121118;
            --color-fondo: #FFFFFF;
            --color-divisor: #E0E0E0;
            --color-banco: #F9F9F9;
        }

        body {
            background-color: var(--color-fondo);
            color: var(--color-texto);
            /* Fallback según guía: Segoe UI o Roboto */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
        }

        h2 {
            color: var(--color-primario);
            font-size: 1.8rem;
            border-bottom: 2px solid var(--color-primario);
            margin-top: 0;
            margin-bottom: 1.5rem;
            padding-bottom: 5px;
            display: inline-block;
            width: 100%;
        }

        .banco-palabras {
            background-color: var(--color-banco);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.1rem;
            text-align: justify;
        }

        .grid-contenido {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 30px;
        }

        /* Estilo para términos en español según instrucción */
        strong {
            font-weight: bold;
            color: var(--color-texto);
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            .grid-contenido {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Los colores / Colors</h2>

        <div class="banco-palabras">
            <div class="grid-contenido">
                <div><strong>el color</strong> – color</div>
                <div><strong>rojo</strong> – red</div>
                <div><strong>anaranjado</strong> – orange</div>
                <div><strong>amarillo</strong> – yellow</div>
                <div><strong>verde</strong> – green</div>
                <div><strong>azul</strong> – blue</div>
                <div><strong>morado</strong> – purple</div>
                <div><strong>rosado</strong> – pink</div>
                <div><strong>negro</strong> – black</div>
                <div><strong>marrón</strong> – brown</div>
                <div><strong>blanco</strong> – white</div>
                <div><strong>gris</strong> – gray</div>
            </div>
        </div>
    </div>

</body>
</html>
